
@if(loggedIn === true) {
  <div mat-dialog-content>
  <h1 mat-dialog-title>Ви вже зареєстровані!</h1>

  <div mat-dialog-actions>
  <button mat-button (click)="close()">Закрити</button>
  <button mat-button color="primary" (click)="logout()">Вийти з акаунту</button>
  </div>
</div>
} @else { 
  <h1 mat-dialog-title>Реєстрація</h1>
  <div mat-dialog-content> 
    <form [formGroup]="form">
       <mat-form-field>
        <mat-label>Ім’я користувача</mat-label>
        <input matInput formControlName="username">
        @if(form.get('username')?.invalid)  {<mat-error> Мінімум 3 символи </mat-error>}
     </mat-form-field>

     <mat-form-field>
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
       @if(form.get('email')?.invalid)  {<mat-error> Некоректний email </mat-error>}
      </mat-form-field>

      <mat-form-field>
        <mat-label>Пароль</mat-label>
        <input matInput type="password" formControlName="password">
        @if(form.get('password')?.invalid)  {<mat-error> Мінімум 6 символів </mat-error>}
      </mat-form-field>
    </form>
  </div>
  <div mat-dialog-actions>
    <button mat-button (click)="close()">Закрити</button>
    <button mat-button color="primary" (click)="onSubmit()">Зареєструватися</button>
  </div>
}

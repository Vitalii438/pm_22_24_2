<h1 mat-dialog-title>Реєстрація</h1>
<div mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field>
      <mat-label>Ім’я користувача</mat-label>
      <input matInput formControlName="username">
      <mat-error *ngIf="form.get('username')?.invalid">Мінімум 3 символи</mat-error>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
      <mat-error *ngIf="form.get('email')?.invalid">Некоректний email</mat-error>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Пароль</mat-label>
      <input matInput type="password" formControlName="password">
      <mat-error *ngIf="form.get('password')?.invalid">Мінімум 6 символів</mat-error>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="close()">Закрити</button>
  <button mat-button color="primary" (click)="onSubmit()">Зареєструватися</button>
</div>
